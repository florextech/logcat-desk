name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
change-template: '- $TITLE by @$AUTHOR (#$NUMBER)'
no-changes-template: '- No user-facing changes were merged in this cycle.'
version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - bug
      - fix
      - docs
      - ci
      - maintenance
  default: patch
categories:
  - title: Features
    labels:
      - feature
      - enhancement
  - title: Fixes
    labels:
      - bug
      - fix
  - title: Documentation
    labels:
      - docs
  - title: CI and Tooling
    labels:
      - ci
      - maintenance
change-title-escapes: '\<*_&'
template: |
  ## What changed

  $CHANGES

  ## Verify before publishing

  - [ ] changelog entry is complete
  - [ ] release artifacts build successfully
  - [ ] version matches package.json
